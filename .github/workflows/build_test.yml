name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test Calculator App
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Python environment
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: |
          python -m unittest test_calc.py -v

      - name: Send Discord failure notification
        uses: sarisia/actions-status-discord@v1
        if: always()
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          # The action automatically detects success/failure, but you can customize the message
          status: ${{ job.status }}
          content: |
            ${{ job.status == 'failure' && '@here ' || '' }}The Calculator App for ${{ github.repository }}
            ${{ job.status == 'success' && 'passed successfully.' || 'integration test failed.' }}
            Check run ${{ github.run_id }} for details.
          title: "Build Status: ${{ job.status }}"
          color: ${{ job.status == 'success' && '0x28a745' || '0xd73a49' }}